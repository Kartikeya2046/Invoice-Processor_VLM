version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: docextract_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/docextract}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - VLM_ENDPOINT=http://vllm:8001
      - SECRET_KEY=${SECRET_KEY:-dev_secret_key}
      - SLM_ENDPOINT=${SLM_ENDPOINT:-https://11434-01kvfdrbbe002xwhcqng7rhh8e.cloudspaces.litng.ai}
      - SLM_MODEL=${SLM_MODEL:-qwen2.5:3b}
      - SLM_API_KEY=${SLM_API_KEY:-}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      - WEBHOOK_MAX_RETRIES=${WEBHOOK_MAX_RETRIES:-4}
      - WEBHOOK_RETRY_BACKOFF_BASE=${WEBHOOK_RETRY_BACKOFF_BASE:-2.0}
      - WEBHOOK_TIMEOUT=${WEBHOOK_TIMEOUT:-10.0}
      - API_KEY=${API_KEY}
    depends_on:
      - postgres
      - redis
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: docextract_worker
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/docextract}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - VLM_ENDPOINT=http://vllm:8001
      - SECRET_KEY=${SECRET_KEY:-dev_secret_key}
      - SLM_ENDPOINT=${SLM_ENDPOINT:-https://11434-01kvfdrbbe002xwhcqng7rhh8e.cloudspaces.litng.ai}
      - SLM_MODEL=${SLM_MODEL:-qwen2.5:3b}
      - SLM_API_KEY=${SLM_API_KEY:-}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      - WEBHOOK_MAX_RETRIES=${WEBHOOK_MAX_RETRIES:-4}
      - WEBHOOK_RETRY_BACKOFF_BASE=${WEBHOOK_RETRY_BACKOFF_BASE:-2.0}
      - WEBHOOK_TIMEOUT=${WEBHOOK_TIMEOUT:-10.0}
      - API_KEY=${API_KEY}
    depends_on:
      - postgres
      - redis
    command: celery -A core.celery_app worker --loglevel=info --concurrency=2

  postgres:
    image: postgres:16-alpine
    container_name: docextract_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=docextract
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: docextract_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  flower:
    image: mher/flower
    container_name: docextract_flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis

  vllm:
    image: vllm/vllm-openai:latest
    ports:
      - "8001:8001"
    command: >
      --model Qwen/Qwen2.5-VL-3B-Instruct-AWQ
      --quantization awq
      --dtype float16
      --max-model-len 4096
      --gpu-memory-utilization 0.82
      --enforce-eager
      --limit-mm-per-prompt '{"image":1,"video":0}'
      --mm-processor-kwargs '{"max_pixels": 1003520}'
      --port 8001
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              count: 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
